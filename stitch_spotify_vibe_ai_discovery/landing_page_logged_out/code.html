<body class="bg-background text-on-surface h-screen w-full flex items-center justify-center overflow-hidden relative">
<!-- Atmospheric background elements (Deep tonal layering) -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-surface-container-high blur-[120px] opacity-30"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-primary/10 blur-[150px] opacity-20"></div>
</div>
<!-- Login Card (Level 1 Surface) -->
<main class="relative z-10 w-full max-w-md px-container-padding flex flex-col items-center text-center">
<!-- Brand Logo / Identity -->
<div class="mb-stack-lg flex flex-col items-center justify-center">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center mb-stack-md shadow-[0_16px_24px_rgba(0,0,0,0.5)] border border-surface-variant/30">
<span class="material-symbols-outlined text-[32px] text-on-surface" data-weight="fill">graphic_eq</span>
</div>
<span class="font-headline-sm text-headline-sm text-on-surface tracking-wide">Spotify Vibe</span>
</div>
<!-- Headline & Subtext -->
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-md leading-tight">
            Describe your vibe.<br/>Discover your music.
        </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg max-w-xs mx-auto">
            Connect your account to generate AI-curated playlists tailored perfectly to your current mood and environment.
        </p>
<!-- Primary CTA Button -->
<button class="w-full sm:w-auto flex items-center justify-center gap-3 bg-primary-container hover:bg-primary transition-colors duration-200 py-4 px-8 rounded-full shadow-[0_8px_16px_rgba(29,185,84,0.15)] group hover:scale-[1.02] active:scale-[0.98]">
<span class="material-symbols-outlined text-on-surface group-hover:rotate-12 transition-transform duration-300">login</span>
<span class="font-headline-sm text-headline-sm text-on-surface">Login with Spotify</span>
</button>
<!-- Subtle Secondary Action -->
<a class="mt-stack-lg font-label-md text-label-md text-tertiary-container hover:text-on-surface transition-colors underline-offset-4 hover:underline" href="#">
            View Privacy Policy
        </a>
